name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  security-scan:

    name: Container and Secret Security Scan

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull OWASP Juice Shop image
        run: docker pull bkimminich/juice-shop

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@<latest-stable-version>
        with:
          image-ref: bkimminich/juice-shop
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@<latest-stable-version>
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL

      - name: Detect exposed secrets
        uses: aquasecurity/trivy-action@<latest-stable-version>
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
